name: Daily FII DII Scrape

on:
  schedule:
    - cron: '30 14 * * *' # 8:00 PM IST
  workflow_dispatch: # Allows manual run button

# THIS IS THE CRITICAL FIX FOR PUSHING DATA
permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pandas
          playwright install chromium

      - name: Run Scraper
        run: python Scraper.py 

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/fii_dii_checkpoint.csv
          git commit -m "Auto-update daily FII/DII data" || exit 0
          git push
